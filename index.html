<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Conference 2026</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="site-header">
        <!-- Navigation section starts -->
        <nav class="navbar-parent">
            <div class="navbar-container container">
                <!-- Left side: Logo -->
                <div class="navbar-left-logo">
                    <img src="./assets/logo.png" alt="logo of the dev conference 2026 website">
                </div>

                <!-- Middle: Nav Links -->
                <div class="navbar-center-links">
                    <ul>
                        <li><a href="#">Speakers</a></li>
                        <li><a href="#">Schedule</a></li>
                        <li><a href="#">Tracks</a></li>
                        <li><a href="#">Venue</a></li>
                        <li><a href="#">Blog</a></li>
                    </ul>
                </div>
                <!-- register button -->
                <div class="navbar-right-button">
                    <button class="common-btn">Register Now</button>
                </div>
            </div>
        </nav>
        <!-- Navigation section ends -->
    </header>

    <!-- Hero section starts -->
    <section class="hero-section">
        <!-- bg image -->
        <div class="hero-overlay"></div>
        <div class="hero-content container">
            <h1 class="hero-title">Code. <em>Connect</em>. Create</h1>
            <p class="hero-description">Join 4,000+ engineers, founders, and builders at the premier developer
            conference of 2026. Three days of cutting-edge talks, hands-on workshops,
            and meaningful connections.</p>
            <button class="common-btn">Register Now</button>
        </div>
    </section>    
    <!-- Hero section ends -->
</body>
</html>
